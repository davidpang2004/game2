"build","bunch","burst","candy","carry","catch","chain","chair","chaos","charm","chase","cheap","check","cheer","chess","chief","child","claim","clash","class","clean","clear","click","cliff","climb","cling","clock","close","cloth","cloud","clown","coral","count","court","cover","crack","craft","crane","crash","crawl","crazy","cream","creek","crisp","cross","crowd","crown","cruel","crush","curve","cycle","daily","dance","death","delta","dense","depth","dozen","draft","drain","drama","drape","dream","dress","drift","drink","drive","drove","drunk","dwarf","dwell","eagle","early","earth","eight","elite","empty","enemy","enjoy","enter","equal","error","event","every","exact","exist","extra","fable","false","fancy","fatal","feast","fence","feral","ferry","fever","fewer","fiber","field","fifth","fifty","fight","final","first","flame","flare","flash","flask","flesh","float","flock","flood","floor","flour","flute","focus","forge","frail","frame","frank","fraud","fresh","front","frost","fruit","funny","fuzzy","genre","ghost","giant","given","gleam","glean","glide","globe","gloom","glory","glove","grace","grade","grand","grant","grape","grasp","grass","grate","graze","greed","greet","grief","grind","groan","group","grove","guard","guess","guide","guile","gusto","habit","haven","hazel","heavy","hedge","hence","herbs","heron","hitch","honey","honor","horse","hotel","hound","house","human","humid","hurry","ideal","image","imply","index","infer","inner","input","issue","ivory","judge","juice","juicy","jumbo","karma","knife","knock","label","large","laser","later","laugh","layer","learn","lease","least","legal","level","light","limbo","limit","linen","liver","local","lodge","lofty","logic","loose","lower","lucky","lunar","lyric","magic","major","maker","manor","maple","march","marry","match","mayor","media","merge","merit","metal","minor","minus","mixed","model","money","month","moral","motor","mount","mouse","mouth","movie","music","naive","noble","north","novel","oasis","ocean","offer","olive","onset","opera","orbit","order","organ","other","outer","owner","oxide","ozone","paint","panic","paper","pasta","patch","pause","peace","pearl","pedal","penny","peril","petal","phase","phone","photo","piano","pilot","pixel","pizza","place","plain","plane","plant","plate","plaza","plead","pluck","plume","point","poker","polar","porch","power","press","price","pride","prime","print","prior","prize","probe","prose","proud","prove","prowl","pulse","punch","purge","queen","query","quest","quick","quiet","quite","quota","quote","radar","radio","raise","rally","ranch","range","rapid","raven","reach","rebel","reign","relax","repay","rider","ridge","risky","rivet","robin","robot","rocky","rouge","rough","round","route","rover","royal","rugby","ruler","rural","rusty","saint","salsa","sandy","sauce","savor","scalp","scare","scarf","scene","scent","scope","score","scout","scrap","screw","scrub","seize","sense","serve","seven","shame","shape","share","shark","sharp","sheep","shelf","shell","shift","shine","shirt","shock","shoot","shore","short","shout","shove","sight","silly","since","sixth","sixty","skill","skull","slash","sleet","slick","slide","slime","slope","sloth","slump","smell","smile","smirk","smoke","snack","snail","snake","snare","sneak","sneer","sniff","snore","snout","snowy","sober","solve","sorry","south","space","spade","spare","spark","spawn","speed","spell","spend","spice","spire","spite","spoke","spook","spore","sport","spout","spray","spunk","squad","squat","stack","staff","stage","stain","stair","stake","stale","stamp","stand","stark","start","stash","state","steak","steal","steam","steel","steep","steer","stern","stiff","sting","stock","stomp","stone","stood","store","storm","story","stout","stove","strap","straw","stray","strip","strut","stuck","study","stuff","stump","stung","stunk","stunt","style","sugar","suite","sunny","super","surge","swamp","swarm","swear","sweat","sweep","sweet","swift","sword","table","talon","tango","tardy","taunt","teach","tempo","tense","thank","their","there","these","thick","thing","think","third","thorn","those","three","threw","throw","thumb","tiger","tight","title","today","token","topic","total","touch","tough","toxic","trace","track","trade","trail","train","trait","trash","trend","trial","tribe","trick","tried","troll","trout","trove","truce","trunk","trust","truth","tulip","twang","twirl","twist","ultra","uncle","under","unify","union","until","upper","upset","urban","usher","usual","utter","vague","valid","valor","valve","vapor","vault","verge","verse","vigor","viral","virus","vital","vivid","vocal","voter","waken","waste","watch","water","weary","weave","wedge","weigh","weird","whale","wheat","wheel","where","which","while","white","whole","whose","wider","width","windy","witch","woman","women","world","worry","worse","worst","worth","would","wrath","write","wrote","yacht","yearn","yield","young","youth","zebra","zilch"];

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function canSpell(word,letters){const av=[...letters.map(l=>l.toLowerCase())];for(const c of word.toLowerCase()){const i=av.indexOf(c);if(i===-1)return false;av.splice(i,1);}return true;}
function scoreWord(w){return w.toUpperCase().split("").reduce((s,c)=>s+(LETTER_VALUES[c]||1),0);}
function isValid(w){return w.length>=3&&WORDLIST.includes(w.toLowerCase());}
function fmtTime(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;}

const DIFF_COLOR={easy:"#1D9E75",medium:"#BA7517",hard:"#D85A30"};
const LABELS=["A","B","C","D"];
const ROUND_TOTAL=6;
const AGE_GROUPS=[{id:"4-6",label:"Ages 4–6",emoji:"🌱",desc:"Simple & fun"},{id:"7-8",label:"Ages 7–8",emoji:"🌟",desc:"Getting clever"},{id:"9-12",label:"Ages 9–12",emoji:"🚀",desc:"Challenge mode"}];

const CHEERS=n=>[`Woohoo, ${n}! That's correct! Amazing job!`,`Yes! Great answer, ${n}! You're so smart!`,`Fantastic, ${n}! You got it right!`,`Awesome, ${n}! You're on fire!`,`Brilliant, ${n}! Keep it up!`];
const ENCOUR=n=>[`That's okay, ${n}! You'll get the next one!`,`Don't give up, ${n}! You're doing great!`,`Keep trying, ${n}! Every mistake helps you learn!`,`Almost, ${n}! You're getting smarter every round!`,`No worries, ${n}! The next question is yours!`];

function speak(text){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=0.95;u.pitch=1.2;window.speechSynthesis.speak(u);}

function App(){
  const [phase,setPhase]=useState("start");
  const [nameInput,setNameInput]=useState("");
  const [playerName,setPlayerName]=useState("");
  const [ageGroup,setAgeGroup]=useState("");
  const [questions,setQuestions]=useState([]);
  const [roundIdx,setRoundIdx]=useState(0);
  const [letters,setLetters]=useState([]);
  const [triviaPts,setTriviaPts]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [feedbackMsg,setFeedbackMsg]=useState("");
  const [timer,setTimer]=useState(180);
  const [wordInput,setWordInput]=useState("");
  const [wordMsg,setWordMsg]=useState("");
  const [wordTimer,setWordTimer]=useState(180);
  const [finalWord,setFinalWord]=useState("");
  const [totalScore,setTotalScore]=useState(0);
  const timerRef=useRef(null);
  const current=questions[roundIdx]||null;

  const startGame=()=>{
    if(!ageGroup){alert("Please select an age group!");return;}
    const name=nameInput.trim()||"Player";
    setPlayerName(name);
    const q=shuffle(QUESTIONS[ageGroup]).slice(0,ROUND_TOTAL);
    setQuestions(q);
    setRoundIdx(0);setLetters([]);setTriviaPts(0);
    setSelected(null);setAnswered(false);setFeedbackMsg("");
    setTimer(180);setFinalWord("");setWordInput("");setWordMsg("");
    speak(`Let's go, ${name}! Good luck!`);
    setPhase("answer");
  };

  const exitGame=()=>{
    clearInterval(timerRef.current);
    window.speechSynthesis.cancel();
    setPhase("start");setNameInput("");setPlayerName("");setAgeGroup("");
  };

  useEffect(()=>{
    if(phase!=="answer")return;
    clearInterval(timerRef.current);
    timerRef.current=setInterval(()=>{
      setTimer(t=>{if(t<=1){clearInterval(timerRef.current);setAnswered(true);return 0;}return t-1;});
    },1000);
    return()=>clearInterval(timerRef.current);
  },[phase,roundIdx]);

  useEffect(()=>{
    if(phase!=="wordTime")return;
    clearInterval(timerRef.current);
    timerRef.current=setInterval(()=>{
      setWordTimer(t=>{if(t<=1){clearInterval(timerRef.current);endGame("");return 0;}return t-1;});
    },1000);
    return()=>clearInterval(timerRef.current);
  },[phase]);

  const selectChoice=(choice)=>{
    if(answered)return;
    clearInterval(timerRef.current);
    setSelected(choice);setAnswered(true);
    const correct=choice===current.a;
    if(correct){setLetters(l=>[...l,current.letter]);setTriviaPts(p=>p+current.pts);}
    const msgs=correct?CHEERS(playerName):ENCOUR(playerName);
    const msg=msgs[Math.floor(Math.random()*msgs.length)];
    setFeedbackMsg(msg);speak(msg);
  };

  const nextRound=()=>{
    const next=roundIdx+1;
    setFeedbackMsg("");
    if(next>=ROUND_TOTAL){setPhase("wordTime");setWordTimer(180);}
    else{setRoundIdx(next);setSelected(null);setAnswered(false);setTimer(180);}
  };

  const submitWord=()=>{
    const w=wordInput.trim();
    if(w.length<3){setWordMsg("Word must be at least 3 letters.");return;}
    if(!canSpell(w,letters)){setWordMsg("You don't have all those letters!");return;}
    if(!isValid(w)){setWordMsg("Not a recognized word. Try another!");return;}
    clearInterval(timerRef.current);endGame(w);
  };

  const endGame=(w)=>{
    clearInterval(timerRef.current);
    const ws=w?scoreWord(w):0;
    setFinalWord(w);setTotalScore(triviaPts+ws);
    if(w)speak(`Amazing, ${playerName}! Your word is ${w}!`);
    setPhase("result");
  };

  // ── Start ──
  if(phase==="start") return(
    <div style={{paddingTop:"1.5rem"}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:40,marginBottom:6}}>🧠</div>
        <h1 style={{fontSize:24,fontWeight:700,color:"#222",marginBottom:6}}>Lexicon Duel</h1>
        <p style={{fontSize:14,color:"#666",lineHeight:1.6}}>Answer trivia to earn letters, then build the highest-scoring word!</p>
      </div>

      <div style={{marginBottom:16}}>
        <label style={{fontSize:14,color:"#555",display:"block",marginBottom:6}}>What's your name?</label>
        <input value={nameInput} onChange={e=>setNameInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&startGame()} placeholder="Enter your name…"/>
      </div>

      <div style={{marginBottom:20}}>
        <label style={{fontSize:14,color:"#555",display:"block",marginBottom:8}}>Select your age group:</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {AGE_GROUPS.map(g=>(
            <button key={g.id} className={`age-btn${ageGroup===g.id?" selected":""}`}
              onClick={()=>setAgeGroup(g.id)}>
              <div style={{fontSize:24,marginBottom:4}}>{g.emoji}</div>
              <div style={{fontSize:13,fontWeight:600,color:"#222"}}>{g.label}</div>
              <div style={{fontSize:11,color:"#888",marginTop:2}}>{g.desc}</div>
            </button>
          ))}
        </div>
      </div>

      <button onClick={startGame} style={{width:"100%",fontSize:15,padding:"12px",background:ageGroup?"#4a7fe5":"#ccc",color:"#fff",border:"none",borderRadius:12}}>
        Start game 🚀
      </button>
    </div>
  );

  // ── Answer ──
  if(phase==="answer"&&current) return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span className="muted">Round {roundIdx+1}/{ROUND_TOTAL} · <span style={{color:DIFF_COLOR[current.diff],fontWeight:600,textTransform:"capitalize"}}>{current.diff}</span> · earn <strong>{current.letter}</strong></span>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:13,fontWeight:600,color:timer<=10?"#D85A30":"#888"}}>{fmtTime(timer)}</span>
          <button onClick={exitGame} style={{fontSize:12,padding:"4px 10px",color:"#888"}}>✕ Exit</button>
        </div>
      </div>
      <div style={{fontSize:17,fontWeight:600,color:"#222",marginBottom:18,lineHeight:1.5}}>{current.q}</div>
      {current.choices.map((choice,i)=>{
        let bg="#fff",border="1px solid #ddd",op=1;
        if(answered){
          if(choice===current.a){bg="#e6f9f2";border="1px solid #1D9E75";}
          else if(choice===selected){bg="#fdecea";border="1px solid #D85A30";}
          else op=0.4;
        }
        return(
          <div key={i} onClick={()=>selectChoice(choice)}
            style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",marginBottom:8,borderRadius:12,border,background:bg,opacity:op,cursor:answered?"default":"pointer"}}>
            <span style={{minWidth:28,height:28,borderRadius:"50%",background:"#f0f0f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:600,color:"#555",flexShrink:0}}>{LABELS[i]}</span>
            <span style={{fontSize:15,color:"#222"}}>{choice}</span>
          </div>
        );
      })}
      {answered&&(
        <div style={{marginTop:16,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:600,marginBottom:14,color:selected===current.a?"#1D9E75":"#D85A30"}}>{feedbackMsg}</div>
          <button onClick={nextRound} style={{fontSize:14,padding:"10px 24px"}}>
            {roundIdx+1<ROUND_TOTAL?"Next round ›":"See results ›"}
          </button>
        </div>
      )}
      {letters.length>0&&(
        <div style={{marginTop:20,padding:"10px 14px",background:"#f5f5f0",borderRadius:10}}>
          <div className="muted" style={{marginBottom:6}}>Your letters</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {letters.map((l,i)=><span key={i} style={{background:"#fff",border:"1px solid #ddd",borderRadius:8,padding:"4px 10px",fontWeight:600,fontSize:15}}>{l}</span>)}
          </div>
        </div>
      )}
    </div>
  );

  // ── Word building ──
  if(phase==="wordTime") return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h3 style={{fontSize:16,fontWeight:600,color:"#222"}}>Build your word!</h3>
        <span style={{fontSize:13,fontWeight:600,color:wordTimer<=30?"#D85A30":"#888"}}>{fmtTime(wordTimer)}</span>
      </div>
      <p className="muted" style={{marginBottom:14}}>Spell the highest-scoring word using your collected letters.</p>
      <div style={{padding:"12px 14px",background:"#f5f5f0",borderRadius:10,marginBottom:14}}>
        <div className="muted" style={{marginBottom:6}}>Your letters · trivia pts: {triviaPts}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {letters.length===0
            ?<span style={{fontSize:13,color:"#aaa"}}>No letters collected</span>
            :letters.map((l,i)=><span key={i} style={{background:"#fff",border:"1px solid #ddd",borderRadius:8,padding:"4px 10px",fontWeight:600,fontSize:15}}>{l} <span style={{fontSize:10,color:"#888"}}>+{LETTER_VALUES[l]||1}</span></span>)
          }
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input value={wordInput} onChange={e=>{setWordInput(e.target.value);setWordMsg("");}}
          onKeyDown={e=>e.key==="Enter"&&submitWord()} placeholder="Type a word…" style={{flex:1}}/>
        <button onClick={submitWord} style={{padding:"8px 16px"}}>Submit</button>
      </div>
      {wordMsg&&<div style={{fontSize:13,color:"#D85A30",marginBottom:8}}>{wordMsg}</div>}
      <button onClick={()=>endGame("")} style={{fontSize:13,color:"#888",background:"none",border:"none",cursor:"pointer",padding:0,marginTop:4}}>Skip →</button>
    </div>
  );

  // ── Result ──
  if(phase==="result"){
    const ws=finalWord?scoreWord(finalWord):0;
    const total=triviaPts+ws;
    const verdict=total>=20?"Master Lexicologist! 🏆":total>=12?"Sharp mind! 🌟":total>=6?"Solid round! 👍":"Good effort! 💪";
    return(
      <div style={{textAlign:"center",paddingTop:"1rem"}}>
        <div style={{fontSize:36,marginBottom:6}}>✨</div>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:4,color:"#222"}}>{playerName}, {verdict}</h2>
        <p className="muted" style={{marginBottom:20}}>Here's how you did:</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
          {[["Trivia pts",triviaPts],["Word score",ws],["Total",total]].map(([l,v])=>(
            <div key={l} style={{background:"#f5f5f0",borderRadius:10,padding:"14px 8px"}}>
              <div className="muted" style={{marginBottom:4}}>{l}</div>
              <div style={{fontSize:26,fontWeight:700,color:"#222"}}>{v}</div>
            </div>
          ))}
        </div>
        {finalWord&&(
          <div className="card" style={{marginBottom:20}}>
            <div className="muted" style={{marginBottom:4}}>Your word</div>
            <div style={{fontSize:24,fontWeight:700,letterSpacing:3,color:"#222"}}>{finalWord.toUpperCase()}</div>
          </div>
        )}
        <button onClick={()=>setPhase("start")} style={{fontSize:15,padding:"10px 30px"}}>Play again 🔄</button>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
